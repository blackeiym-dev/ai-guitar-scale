<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>まっつんのAIギターラボ 指板トレーナー</title>
<style>
:root{--bg:#eef6ff;--bg2:#f9fcff;--panel:#fff;--ink:#102840;--muted:#5f7892;--border:#bfd3e6;--blue:#0d6fbd;--blue2:#2b9bf0;--red:#ef3e3e;--third:#2f80ed;--fifth:#27ae60;--seventh:#8e44ad;--board:#173a5a;--shadow:0 8px 24px rgba(31,84,128,.10)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",Meiryo,sans-serif}.app{max-width:1180px;margin:auto;padding:18px 16px 48px}header{padding:4px 0 14px}.eyebrow{font-size:12px;letter-spacing:.2em;color:var(--blue);font-weight:700}h1{font-size:clamp(30px,5vw,54px);margin:10px 0 8px}h1 span{color:var(--blue)}.sub{margin:0;color:var(--muted);line-height:1.7}.tabs{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0;background:rgba(249,252,255,.95);backdrop-filter:blur(8px)}.tab{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:12px;padding:13px 10px;font-weight:800;cursor:pointer}.tab.active{background:var(--blue);color:#fff}.panel,.board-wrap{background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}.panel-title{font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:800;margin-bottom:12px}.controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}select{width:100%;min-height:46px;border:1px solid var(--border);border-radius:10px;padding:0 12px;background:#fff;color:var(--ink);font-weight:700}.toggle-row{display:flex;gap:8px;flex-wrap:wrap}.toggle{border:1px solid var(--border);background:#f8fbff;color:var(--ink);border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}.toggle.active{background:var(--blue);color:#fff}.board-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.board-title{font-size:clamp(20px,3vw,28px);font-weight:900}.root{color:var(--red)}.board-note{font-size:11px;color:var(--muted);font-weight:700;text-align:right}.board-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}svg{display:block;min-width:860px;width:100%;height:auto}.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--muted)}.legend-item{display:flex;align-items:center;gap:6px}.swatch{width:13px;height:13px;border-radius:50%;display:inline-block}.note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:10px}.metro{display:grid;grid-template-columns:auto auto 1fr;gap:16px;align-items:center}.play{border:none;border-radius:10px;background:var(--blue);color:#fff;padding:13px 22px;font-weight:900;cursor:pointer}.play.playing{background:#c0392b}.metro-dots{display:flex;gap:10px}.metro-dot{width:18px;height:18px;border-radius:50%;background:#e8f1f8;border:1px solid var(--border)}.metro-dot.on{background:var(--blue2);box-shadow:0 0 12px rgba(43,155,240,.7)}.bpm{font-size:28px;color:var(--blue2);font-weight:900;margin-bottom:6px}input[type=range]{width:100%}.help-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.help-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fbfdff}.help-card b{display:block;margin-bottom:5px}footer{text-align:center;color:var(--muted);font-size:12px}
@media(max-width:860px){.controls{grid-template-columns:repeat(2,1fr)}.help-grid{grid-template-columns:1fr}}@media(max-width:640px){.app{padding:12px 10px 36px}.tab{font-size:13px;padding:12px 4px}.panel,.board-wrap{padding:14px}.controls{grid-template-columns:1fr}.board-head{display:block}.board-note{text-align:left;margin-top:6px}.metro{grid-template-columns:1fr}}
</style>
</head>
<body><div class="app">
<header><div class="eyebrow">まっつんのAIギターラボ</div><h1>指板 <span>TRAINER</span></h1><p class="sub">スケール、コードトーン、トライアドを1つの画面で確認。ルート音は赤、各構成音は役割別に色分けして表示します。</p></header>
<div class="tabs"><button class="tab active" data-mode="scale">スケール</button><button class="tab" data-mode="chord">コードトーン</button><button class="tab" data-mode="triad">トライアド</button></div>
<div class="board-wrap"><div class="board-head"><div class="board-title" id="boardTitle"></div><div class="board-note">STANDARD TUNING — E A D G B E<br>スマホでは横にスワイプできます</div></div><div class="board-scroll"><svg id="board" viewBox="0 0 1180 320"></svg></div><div class="legend" id="legend"></div><div class="note" id="boardMessage"></div></div>
<div class="panel"><div class="panel-title">METRONOME / メトロノーム</div><div class="metro"><button class="play" id="metroPlay">再生</button><div class="metro-dots" id="metroDots"></div><div><div class="bpm" id="bpmValue">100 BPM</div><input type="range" id="bpmSlider" min="40" max="240" value="100"><div class="toggle-row" style="margin-top:10px"><button class="toggle active" data-accent="all">全拍</button><button class="toggle" data-accent="backbeat">2・4拍のみ</button></div></div></div></div>
<div class="panel"><div class="panel-title">SETTINGS / 表示設定</div><div class="controls"><div class="field"><label>ルート音</label><select id="rootSelect"></select></div><div class="field"><label id="typeLabel">スケール</label><select id="typeSelect"></select></div><div class="field" id="stringSetField" style="display:none"><label>弦セット</label><select id="stringSetSelect"><option value="all">全弦</option><option value="123">1〜3弦</option><option value="234">2〜4弦</option><option value="345">3〜5弦</option><option value="456">4〜6弦</option></select></div><div class="field" id="inversionField" style="display:none"><label>転回形</label><select id="inversionSelect"><option value="all">すべて</option><option value="root">ルートポジション</option><option value="first">第1転回形</option><option value="second">第2転回形</option></select></div></div><div class="toggle-row" style="margin-top:14px"><button class="toggle active" data-label="note">音名</button><button class="toggle" data-label="degree">度数</button><button class="toggle active" data-frets="15">15フレット</button><button class="toggle" data-frets="22">22フレット</button></div></div>
<div class="panel"><div class="panel-title">GUIDE / 使い方</div><div class="help-grid"><div class="help-card"><b>スケール</b>選んだスケールの構成音を指板全体に表示します。</div><div class="help-card"><b>コードトーン</b>R・3rd・5th・7thを役割別の色で確認できます。</div><div class="help-card"><b>トライアド</b>3音コードを弦セット別に絞り込めます。</div></div></div><footer>まっつんのAIギターラボ — 音を見て、耳で覚える。</footer></div>
<script>
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],TUNING=['E','B','G','D','A','E'],DEG={0:'R',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♭6',9:'6',10:'♭7',11:'7'};
const SCALES=[['メジャー','Major',[0,2,4,5,7,9,11]],['ナチュラルマイナー','Natural Minor',[0,2,3,5,7,8,10]],['メジャーペンタトニック','Major Pentatonic',[0,2,4,7,9]],['マイナーペンタトニック','Minor Pentatonic',[0,3,5,7,10]],['ブルース','Blues',[0,3,5,6,7,10]],['ドリアン','Dorian',[0,2,3,5,7,9,10]],['ミクソリディアン','Mixolydian',[0,2,4,5,7,9,10]],['リディアン','Lydian',[0,2,4,6,7,9,11]],['フリジアン','Phrygian',[0,1,3,5,7,8,10]],['ハーモニックマイナー','Harmonic Minor',[0,2,3,5,7,8,11]]].map(x=>({name:x[0],en:x[1],formula:x[2]}));
const CHORDS=[['メジャー','',[0,4,7]],['マイナー','m',[0,3,7]],['セブンス','7',[0,4,7,10]],['マイナーセブンス','m7',[0,3,7,10]],['メジャーセブンス','maj7',[0,4,7,11]],['ディミニッシュ','dim',[0,3,6]],['オーギュメント','aug',[0,4,8]],['sus2','sus2',[0,2,7]],['sus4','sus4',[0,5,7]]].map(x=>({name:x[0],symbol:x[1],formula:x[2]}));
const TRIADS=[['メジャー・トライアド','',[0,4,7]],['マイナー・トライアド','m',[0,3,7]],['ディミニッシュ・トライアド','dim',[0,3,6]],['オーギュメント・トライアド','aug',[0,4,8]],['sus2トライアド','sus2',[0,2,7]],['sus4トライアド','sus4',[0,5,7]]].map(x=>({name:x[0],symbol:x[1],formula:x[2]}));
let state={mode:'scale',root:'A',typeIdx:3,labelMode:'note',frets:15,stringSet:'all',inversion:'all'};
const idx=n=>NOTES.indexOf(n),list=()=>state.mode==='scale'?SCALES:state.mode==='chord'?CHORDS:TRIADS,item=()=>list()[state.typeIdx]||list()[0];
function col(iv){if(iv===0)return['#ef3e3e','#a91919','#fff'];if(iv===3||iv===4)return['#2f80ed','#155ab6','#fff'];if(iv===6||iv===7||iv===8)return['#27ae60','#18733f','#fff'];if(iv===10||iv===11)return['#8e44ad','#5e2c73','#fff'];return['#f7fbff','#6f89a3','#102840']}
function sync(){rootSelect.innerHTML=NOTES.map(n=>`<option>${n}</option>`).join('');rootSelect.value=state.root;typeSelect.innerHTML=list().map((x,i)=>`<option value="${i}">${x.name}</option>`).join('');typeSelect.value=state.typeIdx;typeLabel.textContent=state.mode==='scale'?'スケール':state.mode==='chord'?'コード種類':'トライアド種類';stringSetField.style.display=inversionField.style.display=state.mode==='triad'?'block':'none'}
function draw(){const svg=document.getElementById('board');svg.innerHTML='';const NS='http://www.w3.org/2000/svg',w=1180,h=320,ml=70,mr=35,mt=30,mb=45,bw=w-ml-mr,fg=bw/state.frets,sg=(h-mt-mb)/5,ri=idx(state.root),it=item(),set=new Set(it.formula.map(iv=>(ri+iv)%12));const mk=(tag,a)=>{const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e};mk('rect',{x:ml,y:mt,width:bw,height:h-mt-mb,fill:'#173a5a',rx:6});[3,5,7,9,15,17,19,21].forEach(f=>{if(f<=state.frets)mk('circle',{cx:ml+(f-.5)*fg,cy:h/2,r:5,fill:'#8ca8c2'})});for(let f=0;f<=state.frets;f++){let x=ml+f*fg;mk('line',{x1:x,x2:x,y1:mt,y2:h-mb,stroke:f===0?'#fff':'#a9bfd2','stroke-width':f===0?5:2,opacity:f===0?1:.7});if(f>0){let t=mk('text',{x:x-fg/2,y:h-mb+24,'text-anchor':'middle','font-size':11,fill:'#5f7892'});t.textContent=f}}for(let s=0;s<6;s++){let y=mt+s*sg;mk('line',{x1:ml-15,x2:w-mr,y1:y,y2:y,stroke:'#d8e5f0','stroke-width':1.3+(5-s)*.35});let t=mk('text',{x:ml-28,y:y+4,'text-anchor':'middle','font-size':12,'font-weight':700,fill:'#5f7892'});t.textContent=TUNING[s]}for(let s=0;s<6;s++){if(state.mode==='triad'&&state.stringSet!=='all'&&!state.stringSet.split('').map(Number).includes(s+1))continue;let y=mt+s*sg,oi=idx(TUNING[s]);for(let f=0;f<=state.frets;f++){let ni=(oi+f)%12;if(!set.has(ni))continue;let iv=(ni-ri+12)%12,x=f===0?ml-15:ml+(f-.5)*fg,c=col(iv);mk('circle',{cx:x,cy:y,r:iv===0?13:11,fill:c[0],stroke:c[1],'stroke-width':iv===0?3:1.5});let t=mk('text',{x:x,y:y+3.5,'text-anchor':'middle','font-size':10,'font-weight':800,fill:c[2]});t.textContent=state.labelMode==='note'?NOTES[ni]:DEG[iv]}}}
function render(){sync();draw();let it=item();boardTitle.innerHTML=state.mode==='scale'?`<span class="root">${state.root}</span> ${it.name} <small>(${it.en})</small>`:`<span class="root">${state.root}</span>${it.symbol} — ${it.name}`;legend.innerHTML=it.formula.map(iv=>`<span class="legend-item"><span class="swatch" style="background:${col(iv)[0]}"></span>${DEG[iv]}</span>`).join('');boardMessage.textContent=state.mode==='triad'?'弦セットを絞ると、3音のまとまりを見つけやすくなります。':state.mode==='chord'?'コードトーンは、アドリブで着地する音を見つけるための表示です。':'スケール構成音を指板全体に表示します。'}
rootSelect.onchange=e=>{state.root=e.target.value;render()};typeSelect.onchange=e=>{state.typeIdx=+e.target.value;render()};stringSetSelect.onchange=e=>{state.stringSet=e.target.value;render()};inversionSelect.onchange=e=>{state.inversion=e.target.value;render()};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.typeIdx=0;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));render()});document.querySelectorAll('[data-label]').forEach(b=>b.onclick=()=>{state.labelMode=b.dataset.label;document.querySelectorAll('[data-label]').forEach(x=>x.classList.toggle('active',x===b));render()});document.querySelectorAll('[data-frets]').forEach(b=>b.onclick=()=>{state.frets=+b.dataset.frets;document.querySelectorAll('[data-frets]').forEach(x=>x.classList.toggle('active',x===b));render()});
let ac=null,playing=false,beat=0,next=0,timer,bpm=100,accent='all';metroDots.innerHTML='<div class="metro-dot"></div>'.repeat(4);function sched(){while(next<ac.currentTime+.1){let b=beat;if(accent==='all'||b===1||b===3){let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=b===0?1000:700;g.gain.setValueAtTime(.0001,next);g.gain.exponentialRampToValueAtTime(1,next+.002);g.gain.exponentialRampToValueAtTime(.001,next+.06);o.connect(g);g.connect(ac.destination);o.start(next);o.stop(next+.07)}setTimeout(()=>{document.querySelectorAll('.metro-dot').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.metro-dot')[b]?.classList.add('on');setTimeout(()=>document.querySelectorAll('.metro-dot')[b]?.classList.remove('on'),110)},Math.max(0,(next-ac.currentTime)*1000));next+=60/bpm;beat=(beat+1)%4}timer=setTimeout(sched,25)}metroPlay.onclick=()=>{if(playing){playing=false;clearTimeout(timer);metroPlay.textContent='再生';metroPlay.classList.remove('playing')}else{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();playing=true;beat=0;next=ac.currentTime+.05;sched();metroPlay.textContent='停止';metroPlay.classList.add('playing')}};bpmSlider.oninput=e=>{bpm=+e.target.value;bpmValue.textContent=bpm+' BPM'};document.querySelectorAll('[data-accent]').forEach(b=>b.onclick=()=>{accent=b.dataset.accent;document.querySelectorAll('[data-accent]').forEach(x=>x.classList.toggle('active',x===b))});render();
</script></body></html>
