<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まっつんのAIギターラボ スケール Cheat Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#f4f8fc;
    --bg-mid:#e7f0f8;
    --panel:#ffffff;
    --panel-light:#eaf2f8;
    --fret-metal:#afc2d3;
    --string:#e3edf5;
    --blue:#0868b8;
    --blue-glow:#32a8ff;
    --cream:#102a43;
    --muted:#425b70;
    --muted-dim:#6f879b;
    --border:#b9cddd;
    --inlay:#7893aa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% 0%, rgba(79,168,255,0.10), transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(79,168,255,0.06), transparent 50%),
      linear-gradient(180deg,#fbfdff 0%,#edf5fb 100%);
    color:var(--cream);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
    padding:24px 14px 48px;
  }
  .app{max-width:1080px;margin:0 auto;}

  header{margin-bottom:28px;position:relative;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:0.25em;
    color:var(--blue);text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:clamp(30px,5.4vw,50px);
    letter-spacing:0.02em;
    color:var(--cream);
    text-shadow:none;
  }
  h1 span{color:var(--blue);}
  .sub{
    font-size:13.5px;color:var(--muted);margin-top:8px;max-width:560px;line-height:1.6;
  }

  .panel{
    background:#ffffff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 6px 18px rgba(16,42,67,0.07);
    padding:18px 18px;
    margin-bottom:18px;
  }
  .panel-title{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }

  .root-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
  }
  @media (max-width:640px){.root-grid{grid-template-columns:repeat(4,1fr);}}
  .note-btn{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:14px;
    background:var(--panel-light);
    color:var(--cream);
    border:1px solid var(--border);
    border-radius:6px;
    padding:10px 0;
    cursor:pointer;
    transition:all .15s ease;
  }
  .note-btn:hover{border-color:var(--blue);color:var(--blue-glow);}
  .note-btn.active{
    background:linear-gradient(180deg,#1697ea,var(--blue));
    color:#ffffff;
    border-color:var(--blue);
    box-shadow:0 4px 12px rgba(8,104,184,0.28);
  }

  .select-control{
    width:100%;
    min-height:48px;
    padding:11px 42px 11px 14px;
    border:2px solid var(--border);
    border-radius:8px;
    background:var(--panel-light);
    color:var(--cream);
    font-family:'Work Sans',sans-serif;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
  }
  .select-control:focus{
    outline:3px solid rgba(79,168,255,.25);
    border-color:var(--blue);
  }
  @media (max-width:640px){
    .select-control{font-size:17px;min-height:52px;}
  }

  .row{display:flex;gap:22px;flex-wrap:wrap;}
  .col{flex:1;min-width:240px;}

  .scale-list{display:flex;flex-direction:column;gap:6px;}
  .scale-btn{
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    border-radius:6px;
    padding:9px 12px;
    color:var(--muted);
    font-size:14px;
    cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
    transition:all .15s ease;
    width:100%;
  }
  .scale-btn:hover{background:var(--panel-light);color:var(--cream);}
  .scale-btn.active{
    background:#e2f1fc;
    border-color:var(--blue);
    color:var(--blue-glow);
  }
  .scale-btn .formula{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted-dim);
  }
  .scale-btn.active .formula{color:var(--blue);}

  .toggle-group{display:flex;gap:8px;flex-wrap:wrap;}
  .toggle-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    background:var(--panel-light);
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:5px;
    padding:8px 14px;
    cursor:pointer;
  }
  .toggle-btn.active{
    background:var(--blue);
    border-color:var(--blue);
    color:#ffffff;
    font-weight:700;
  }
  .toggle-btn:disabled{opacity:.35;cursor:not-allowed;}
  label.field{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;letter-spacing:.05em;}

  .board-wrap{
    background:#ffffff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 6px 18px rgba(16,42,67,0.07);
    padding:24px 18px 16px;
    overflow-x:auto;
  }
  .board-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
  .board-title{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:.02em;}
  .board-title b{color:#d70015;}
  .board-note{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

  svg{display:block;width:100%;height:auto;min-width:0;touch-action:pan-x pan-y;}

  .legend{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);align-items:center;}
  .legend .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:-1px;}
  .note-small{font-size:11px;color:var(--muted-dim);margin-top:10px;line-height:1.6;}

  /* metronome */
  .metro-wrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
  .metro-dots{display:flex;gap:10px;}
  .metro-dot{
    width:16px;height:16px;border-radius:50%;
    background:var(--panel-light);border:1px solid var(--border);
    transition:all .06s ease;
  }
  .metro-dot.on{background:var(--blue-glow);box-shadow:0 0 12px var(--blue-glow);border-color:var(--blue);}
  .metro-dot.accent.on{background:#fff;box-shadow:0 0 16px #fff;}
  .metro-dot.muted-flash{background:var(--border);border-color:var(--muted-dim);}
  .bpm-block{display:flex;flex-direction:column;gap:8px;min-width:220px;flex:1;}
  .bpm-value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--blue-glow);}
  input[type=range]{
    -webkit-appearance:none;width:100%;height:5px;border-radius:3px;
    background:var(--panel-light);outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:17px;height:17px;border-radius:50%;
    background:var(--blue-glow);cursor:pointer;border:2px solid var(--bg-dark);
  }
  .play-btn{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
    background:var(--blue);color:#ffffff;border:none;border-radius:7px;
    padding:12px 22px;cursor:pointer;letter-spacing:.05em;
  }
  .play-btn.playing{background:#c0392b;color:#fff;}
  .metro-sub{width:100%;padding-top:4px;border-top:1px dashed var(--border);margin-top:4px;}

  /* presets */
  .preset-row{display:flex;gap:8px;margin-bottom:14px;}
  .preset-row input{
    flex:1;background:var(--panel-light);border:1px solid var(--border);
    color:var(--cream);border-radius:6px;padding:9px 12px;font-size:13px;font-family:'Work Sans',sans-serif;
  }
  .preset-row input:focus{outline:1px solid var(--blue);}
  .preset-save{
    background:var(--blue);color:#ffffff;border:none;border-radius:6px;
    padding:0 16px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;cursor:pointer;
  }
  .preset-list{display:flex;flex-direction:column;gap:6px;}
  .preset-item{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--panel-light);border:1px solid var(--border);border-radius:6px;
    padding:9px 12px;cursor:pointer;
  }
  .preset-item:hover{border-color:var(--blue);}
  .preset-item .pname{font-size:13.5px;color:var(--cream);}
  .preset-item .pdetail{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .preset-del{
    background:none;border:none;color:var(--muted-dim);font-size:16px;cursor:pointer;padding:2px 6px;
  }
  .preset-del:hover{color:#e0554a;}
  .preset-empty{font-size:12.5px;color:var(--muted-dim);font-style:italic;}
  .preset-status{font-size:11px;color:var(--muted-dim);font-family:'JetBrains Mono',monospace;margin-top:8px;}

  footer{margin-top:26px;text-align:center;font-size:11.5px;color:var(--muted-dim);font-family:'JetBrains Mono',monospace;}

  button,input{font-size:16px;}
  button{min-height:44px;-webkit-tap-highlight-color:transparent;}
  .note-btn,.toggle-btn,.play-btn,.preset-save{touch-action:manipulation;}
  .board-wrap{-webkit-overflow-scrolling:touch;}

  @media (max-width:820px){
    body{padding:18px 10px 36px;}
    header{margin-bottom:20px;}
    .panel{padding:16px 14px;margin-bottom:14px;}
    .row{gap:14px;}
    .col{min-width:100%;}
    .row .panel.col[style]{max-width:none!important;flex:1 1 100%!important;}
    .root-grid{grid-template-columns:repeat(6,1fr);}
    .scale-btn{padding:11px 12px;font-size:15px;}
    .toggle-group{gap:7px;}
    .toggle-btn{flex:1 1 auto;padding:10px 12px;}
    .board-wrap{padding:18px 8px 14px;}
    .board-head{padding:0 8px;}
    #board{min-width:720px;}
    .metro-wrap{align-items:stretch;}
    .play-btn{width:100%;}
    .metro-dots{justify-content:center;width:100%;}
    .bpm-block{min-width:100%;}
    .preset-row{flex-direction:column;}
    .preset-save{height:46px;}
  }

  @media (max-width:520px){
    .root-grid{grid-template-columns:repeat(4,1fr);}
    h1{font-size:34px;line-height:1.08;}
    .sub{font-size:13px;}
    #board{min-width:660px;}
    .legend{gap:10px;font-size:11px;}
    .preset-item{align-items:flex-start;gap:8px;}
  }


  .note-btn,.scale-btn,.toggle-btn,.play-btn,.preset-save{
    -webkit-tap-highlight-color:transparent;
  }
  .note-btn:focus-visible,.scale-btn:focus-visible,.toggle-btn:focus-visible,.play-btn:focus-visible,.preset-save:focus-visible{
    outline:3px solid rgba(50,168,255,.35);
    outline-offset:2px;
  }
  @media (max-width:760px){
    body{padding:14px 10px 36px;}
    .panel,.board-wrap{border-radius:12px;}
    .panel-title{font-size:11px;color:#314c63;}
    .note-btn{min-height:46px;font-size:15px;}
    .scale-btn{min-height:44px;color:#334e68;}
    .toggle-btn{min-height:42px;font-size:13px;}
    .board-title{font-size:19px;}
    .board-note{font-size:10px;}
    .legend{font-size:13px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">まっつんのAIギターラボ</div>
    <h1>スケール <span>CHEAT SHEET</span></h1>
    <p class="sub">ルート音とスケールを選ぶと、指板上に該当する音が光る。ポジション表示・メトロノーム・プリセット保存に対応。</p>
  </header>

  <div class="board-wrap">
    <div class="board-head">
      <div class="board-title" id="boardTitle"></div>
      <div class="board-note">STANDARD TUNING — E A D G B E<br><span style="font-size:10px;">スマホでは横にスワイプして指板を確認できます</span></div>
    </div>
    <svg id="board" viewBox="0 0 1180 300" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="legend">
      <span><span class="dot" style="background:#ff4d4f;box-shadow:0 0 8px rgba(255,77,79,.65);"></span>ルート音</span>
      <span><span class="dot" style="background:var(--fret-metal);"></span>スケール構成音</span>
    </div>
    <div class="note-small" id="positionNote"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Metronome / メトロノーム</div>
    <div class="metro-wrap">
      <button class="play-btn" id="metroPlay">再生</button>
      <div class="metro-dots" id="metroDots"></div>
      <div class="bpm-block">
        <div class="bpm-value" id="bpmValue">100 BPM</div>
        <input type="range" id="bpmSlider" min="40" max="240" value="100">
      </div>
      <div class="metro-sub">
        <label class="field" style="margin-bottom:8px;">クリックする拍</label>
        <div class="toggle-group" id="accentToggle"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Root Note / ルート音</div>
    <select id="rootSelect" class="select-control" aria-label="ルート音を選択"></select>
  </div>

  <div class="row">
    <div class="panel col">
      <div class="panel-title">Scale / スケール</div>
      <select id="scaleSelect" class="select-control" aria-label="スケールを選択"></select>
    </div>
    <div class="panel col" style="max-width:280px;flex:0 0 260px;">
      <div class="panel-title">Display</div>
      <label class="field">表示ラベル</label>
      <div class="toggle-group" id="labelToggle" style="margin-bottom:18px;"></div>
      <label class="field">フレット数</label>
      <div class="toggle-group" id="fretToggle" style="margin-bottom:18px;"></div>
      <label class="field">表示範囲</label>
      <div class="toggle-group" id="viewToggle" style="margin-bottom:10px;"></div>
      <div class="toggle-group" id="positionToggle"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Presets / プリセット</div>
    <div class="preset-row">
      <input type="text" id="presetName" placeholder="プリセット名（例：クラプトン風 Aマイナーペンタ）" maxlength="40">
      <button class="preset-save" id="presetSave">保存</button>
    </div>
    <div class="preset-list" id="presetList"></div>
    <div class="preset-status" id="presetStatus"></div>
  </div>

  <footer>まっつんのAIギターラボ — 音を見て、耳で覚える。</footer>
</div>

<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SCALES = [
  {name:'メジャー', en:'Major', formula:[0,2,4,5,7,9,11]},
  {name:'ナチュラルマイナー', en:'Natural Minor', formula:[0,2,3,5,7,8,10]},
  {name:'メジャーペンタトニック', en:'Major Pentatonic', formula:[0,2,4,7,9]},
  {name:'マイナーペンタトニック', en:'Minor Pentatonic', formula:[0,3,5,7,10]},
  {name:'ブルース', en:'Blues', formula:[0,3,5,6,7,10]},
  {name:'ドリアン', en:'Dorian', formula:[0,2,3,5,7,9,10]},
  {name:'ミクソリディアン', en:'Mixolydian', formula:[0,2,4,5,7,9,10]},
  {name:'リディアン', en:'Lydian', formula:[0,2,4,6,7,9,11]},
  {name:'フリジアン', en:'Phrygian', formula:[0,1,3,5,7,8,10]},
  {name:'ロクリアン', en:'Locrian', formula:[0,1,3,5,6,8,10]},
  {name:'ハーモニックマイナー', en:'Harmonic Minor', formula:[0,2,3,5,7,8,11]},
];
const TUNING = ['E','B','G','D','A','E']; // index0 = high e (top row), index5 = low E (bottom row)
const DEGREE_LABELS = ['R','♭2','2','♭3','3','4','♭5','5','♭6','6','♭7','7'];
const POSITION_OFFSETS = [0,2,5,7,10];
const BOX_WIDTH = 4;

let state = {
  root: 'A',
  scaleIdx: 3,
  labelMode: 'note',
  frets: 15,
  viewMode: 'full',
  position: 1,
};

function noteIndex(n){ return NOTES.indexOf(n); }

function buildRootGrid(){
  const el = document.getElementById('rootSelect');
  el.innerHTML = '';
  NOTES.forEach(n=>{
    const o = document.createElement('option');
    o.value = n;
    o.textContent = n;
    o.selected = n===state.root;
    el.appendChild(o);
  });
  el.onchange = ()=>{ state.root = el.value; render(); };
}

function buildScaleList(){
  const el = document.getElementById('scaleSelect');
  el.innerHTML = '';
  SCALES.forEach((s,i)=>{
    const o = document.createElement('option');
    o.value = String(i);
    o.textContent = `${s.name} (${s.en})`;
    o.selected = i===state.scaleIdx;
    el.appendChild(o);
  });
  el.onchange = ()=>{ state.scaleIdx = parseInt(el.value,10); render(); };
}

function buildToggles(){
  const lt = document.getElementById('labelToggle');
  lt.innerHTML = '';
  [['note','音名'],['degree','度数']].forEach(([val,label])=>{
    const b = document.createElement('button');
    b.className = 'toggle-btn' + (state.labelMode===val?' active':'');
    b.textContent = label;
    b.onclick = ()=>{ state.labelMode = val; render(); };
    lt.appendChild(b);
  });
  const ft = document.getElementById('fretToggle');
  ft.innerHTML = '';
  [12,15,22].forEach(n=>{
    const b = document.createElement('button');
    b.className = 'toggle-btn' + (state.frets===n?' active':'');
    b.textContent = n;
    b.onclick = ()=>{ state.frets = n; render(); };
    ft.appendChild(b);
  });
  const vt = document.getElementById('viewToggle');
  vt.innerHTML = '';
  [['full','全体'],['position','ポジション']].forEach(([val,label])=>{
    const b = document.createElement('button');
    b.className = 'toggle-btn' + (state.viewMode===val?' active':'');
    b.textContent = label;
    b.onclick = ()=>{ state.viewMode = val; render(); };
    vt.appendChild(b);
  });
  const pt = document.getElementById('positionToggle');
  pt.innerHTML = '';
  if(state.viewMode==='position'){
    [1,2,3,4,5].forEach(p=>{
      const b = document.createElement('button');
      b.className = 'toggle-btn' + (state.position===p?' active':'');
      b.textContent = 'P'+p;
      b.onclick = ()=>{ state.position = p; render(); };
      pt.appendChild(b);
    });
  }
}

function getPositionBox(){
  const rootFretBase = ((noteIndex(state.root) - noteIndex('E')) + 12) % 12;
  const start = rootFretBase + POSITION_OFFSETS[state.position-1];
  return { start, end: start + BOX_WIDTH };
}

function drawBoard(){
  const svg = document.getElementById('board');
  svg.innerHTML = '';
  const NS = 'http://www.w3.org/2000/svg';

  const frets = state.frets;
  const marginL = 60, marginR = 40, marginT = 20, marginB = 40;
  const width = 1180, height = 300;
  const boardW = width - marginL - marginR;
  const stringGap = (height - marginT - marginB) / 5;
  const fretGap = boardW / frets;

  const rootIdx = noteIndex(state.root);
  const scale = SCALES[state.scaleIdx];
  const scaleSet = new Set(scale.formula.map(iv => (rootIdx+iv)%12));
  const box = state.viewMode==='position' ? getPositionBox() : null;

  const bg = document.createElementNS(NS,'rect');
  bg.setAttribute('x',marginL); bg.setAttribute('y',marginT);
  bg.setAttribute('width',boardW); bg.setAttribute('height',height-marginT-marginB);
  bg.setAttribute('fill','#17324d');
  bg.setAttribute('rx','4');
  svg.appendChild(bg);

  if(box){
    const bx1 = Math.max(0,box.start);
    const bx2 = Math.min(frets,box.end);
    if(bx2>bx1){
      const x = bx1===0 ? marginL-14 : marginL + (bx1-0.5)*fretGap;
      const x2 = marginL + (bx2-0.5)*fretGap;
      const rect = document.createElementNS(NS,'rect');
      rect.setAttribute('x', x);
      rect.setAttribute('y', marginT-6);
      rect.setAttribute('width', Math.max(0,x2-x));
      rect.setAttribute('height', height-marginT-marginB+12);
      rect.setAttribute('fill','rgba(50,168,255,0.18)');
      rect.setAttribute('stroke','rgba(50,168,255,0.85)');
      rect.setAttribute('stroke-dasharray','4,4');
      rect.setAttribute('rx','6');
      svg.appendChild(rect);
    }
  }

  const markerFrets = [3,5,7,9,15,17,19,21];
  markerFrets.forEach(f=>{
    if(f>frets) return;
    const cx = marginL + (f-0.5)*fretGap;
    const cy = height/2;
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',5);
    c.setAttribute('fill','var(--inlay)');
    svg.appendChild(c);
  });
  if(12<=frets){
    const cx = marginL + (12-0.5)*fretGap, cy=height/2;
    [cy-25,cy+25].forEach(y=>{
      const c = document.createElementNS(NS,'circle');
      c.setAttribute('cx',cx); c.setAttribute('cy',y); c.setAttribute('r',5);
      c.setAttribute('fill','var(--inlay)');
      svg.appendChild(c);
    });
  }

  for(let f=0; f<=frets; f++){
    const x = marginL + f*fretGap;
    const line = document.createElementNS(NS,'line');
    line.setAttribute('x1',x); line.setAttribute('x2',x);
    line.setAttribute('y1',marginT); line.setAttribute('y2',height-marginB);
    line.setAttribute('stroke', f===0 ? 'var(--cream)' : 'var(--fret-metal)');
    line.setAttribute('stroke-width', f===0 ? 5 : 2);
    line.setAttribute('opacity', f===0 ? 1 : 0.55);
    svg.appendChild(line);
    if(f>0){
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', x - fretGap/2);
      t.setAttribute('y', height-marginB+22);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family','JetBrains Mono, monospace');
      t.setAttribute('font-size','11');
      t.setAttribute('fill','#526d83');
      t.textContent = f;
      svg.appendChild(t);
    }
  }

  for(let s=0; s<6; s++){
    const y = marginT + s*stringGap;
    const line = document.createElementNS(NS,'line');
    line.setAttribute('x1',marginL-14); line.setAttribute('x2', width-marginR);
    line.setAttribute('y1',y); line.setAttribute('y2',y);
    line.setAttribute('stroke','var(--string)');
    line.setAttribute('stroke-width', 1.2 + (5-s)*0.35);
    line.setAttribute('opacity',0.85);
    svg.appendChild(line);

    const lbl = document.createElementNS(NS,'text');
    lbl.setAttribute('x', marginL-24);
    lbl.setAttribute('y', y+4);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('font-family','JetBrains Mono, monospace');
    lbl.setAttribute('font-size','12');
    lbl.setAttribute('font-weight','700');
    lbl.setAttribute('fill','var(--muted)');
    lbl.textContent = TUNING[s];
    svg.appendChild(lbl);
  }

  for(let s=0; s<6; s++){
    const y = marginT + s*stringGap;
    const openNoteIdx = noteIndex(TUNING[s]);
    for(let f=0; f<=frets; f++){
      const noteIdx = (openNoteIdx + f) % 12;
      if(!scaleSet.has(noteIdx)) continue;
      if(box && (f<box.start || f>box.end)) continue;
      const isRoot = noteIdx === rootIdx;
      const x = f===0 ? marginL - 14 : marginL + (f-0.5)*fretGap;

      const g = document.createElementNS(NS,'g');
      if(isRoot){
        const glow = document.createElementNS(NS,'circle');
        glow.setAttribute('cx',x); glow.setAttribute('cy',y); glow.setAttribute('r',15);
        glow.setAttribute('fill','#ff4d4f');
        glow.setAttribute('opacity','0.28');
        g.appendChild(glow);
      }
      const c = document.createElementNS(NS,'circle');
      c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r', f===0?9:11);
      c.setAttribute('fill', isRoot ? '#ff3b30' : '#ffffff');
      c.setAttribute('stroke', isRoot ? '#8b0000' : '#8ba4b8');
      c.setAttribute('stroke-width','1.5');
      g.appendChild(c);

      const label = state.labelMode==='note' ? NOTES[noteIdx] : DEGREE_LABELS[(noteIdx-rootIdx+12)%12];
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x',x); t.setAttribute('y', y+3.5);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family','JetBrains Mono, monospace');
      t.setAttribute('font-size', label.length>2 ? '8.5':'10');
      t.setAttribute('font-weight','700');
      t.setAttribute('fill', isRoot ? '#ffffff' : '#102a43');
      t.textContent = label;
      g.appendChild(t);

      svg.appendChild(g);
    }
  }
}

function render(){
  buildRootGrid();
  buildScaleList();
  buildToggles();
  drawBoard();
  const s = SCALES[state.scaleIdx];
  document.getElementById('boardTitle').innerHTML = `<b style="color:#ff4d4f">${state.root}</b> ${s.name} <span style="color:var(--muted);font-size:14px;">(${s.en})</span>`;
  const noteEl = document.getElementById('positionNote');
  noteEl.textContent = state.viewMode==='position'
    ? `ポジション${state.position} は目安表示です（ローE弦のルート音を基準にしたおおよそのボックス位置。7音スケールでは実際の運指と多少ずれる場合があります）。`
    : '';
}

/* ---------------- Metronome ---------------- */
let audioCtx = null;
let isPlaying = false;
let currentBeat = 0;
let nextNoteTime = 0.0;
let timerID = null;
const beatsPerMeasure = 4;
const lookahead = 25.0;
const scheduleAheadTime = 0.1;
let bpm = 100;
let accentMode = 'all'; // 'all' | 'backbeat' (only beats 2 & 4 click)

function buildMetroDots(){
  const el = document.getElementById('metroDots');
  el.innerHTML = '';
  for(let i=0;i<beatsPerMeasure;i++){
    const d = document.createElement('div');
    d.className = 'metro-dot' + (i===0 ? ' accent' : '');
    d.dataset.beat = i;
    el.appendChild(d);
  }
}
function buildAccentToggle(){
  const el = document.getElementById('accentToggle');
  el.innerHTML = '';
  [['all','全拍'],['backbeat','2・4拍のみ']].forEach(([val,label])=>{
    const b = document.createElement('button');
    b.className = 'toggle-btn' + (accentMode===val?' active':'');
    b.textContent = label;
    b.onclick = ()=>{ accentMode = val; buildAccentToggle(); };
    el.appendChild(b);
  });
}
function shouldSound(beatNumber){
  if(accentMode==='all') return true;
  return beatNumber===1 || beatNumber===3; // 2nd and 4th beat (0-indexed)
}
function flashBeat(beatNumber, sounding){
  const dots = document.querySelectorAll('.metro-dot');
  dots.forEach(d=>d.classList.remove('on','muted-flash'));
  const target = dots[beatNumber];
  if(target){
    target.classList.add(sounding ? 'on' : 'muted-flash');
    setTimeout(()=>target.classList.remove('on','muted-flash'), 110);
  }
}
function scheduleNote(beatNumber, time){
  const sounding = shouldSound(beatNumber);
  if(sounding){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = beatNumber % beatsPerMeasure === 0 ? 1000 : 700;
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(1, time+0.002);
    gain.gain.exponentialRampToValueAtTime(0.001, time+0.06);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(time); osc.stop(time+0.07);
  }
  const delay = Math.max(0,(time - audioCtx.currentTime)*1000);
  setTimeout(()=>flashBeat(beatNumber, sounding), delay);
}
function nextNote(){
  const secondsPerBeat = 60.0/bpm;
  nextNoteTime += secondsPerBeat;
  currentBeat = (currentBeat+1) % beatsPerMeasure;
}
function scheduler(){
  while(nextNoteTime < audioCtx.currentTime + scheduleAheadTime){
    scheduleNote(currentBeat, nextNoteTime);
    nextNote();
  }
  timerID = setTimeout(scheduler, lookahead);
}
function startMetronome(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  isPlaying = true;
  currentBeat = 0;
  nextNoteTime = audioCtx.currentTime + 0.05;
  scheduler();
  document.getElementById('metroPlay').textContent = '停止';
  document.getElementById('metroPlay').classList.add('playing');
}
function stopMetronome(){
  isPlaying = false;
  clearTimeout(timerID);
  document.getElementById('metroPlay').textContent = '再生';
  document.getElementById('metroPlay').classList.remove('playing');
  document.querySelectorAll('.metro-dot').forEach(d=>d.classList.remove('on','muted-flash'));
}
function initMetronome(){
  buildMetroDots();
  buildAccentToggle();
  document.getElementById('bpmSlider').addEventListener('input', e=>{
    bpm = parseInt(e.target.value,10);
    document.getElementById('bpmValue').textContent = bpm + ' BPM';
  });
  document.getElementById('metroPlay').addEventListener('click', ()=>{
    isPlaying ? stopMetronome() : startMetronome();
  });
}

/* ---------------- Presets (window.storage / localStorage fallback) ---------------- */
const PRESET_KEY = 'scale-viewer-presets';
let presetsAvailable = true;

async function loadPresets(){
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const res = await window.storage.get(PRESET_KEY, false);
      return res && res.value ? JSON.parse(res.value) : [];
    }
    const raw = localStorage.getItem(PRESET_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    return [];
  }
}
async function savePresetsList(list){
  if(window.storage && typeof window.storage.set === 'function'){
    await window.storage.set(PRESET_KEY, JSON.stringify(list), false);
  }else{
    localStorage.setItem(PRESET_KEY, JSON.stringify(list));
  }
}
function currentSettingsSummary(){
  const s = SCALES[state.scaleIdx];
  return `${state.root} ${s.name} / ${state.labelMode==='note'?'音名':'度数'} / ${state.frets}fret` +
    (state.viewMode==='position' ? ` / P${state.position}` : '');
}
async function refreshPresetList(){
  const el = document.getElementById('presetList');
  const status = document.getElementById('presetStatus');
  if(!presetsAvailable){
    el.innerHTML = '<div class="preset-empty">プリセット機能を利用できません。ブラウザの保存設定をご確認ください。</div>';
    status.textContent = '';
    return;
  }
  const list = await loadPresets();
  el.innerHTML = '';
  if(list.length===0){
    el.innerHTML = '<div class="preset-empty">保存されたプリセットはありません。</div>';
    return;
  }
  list.forEach((p, idx)=>{
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.innerHTML = `<div><div class="pname">${escapeHtml(p.name)}</div><div class="pdetail">${escapeHtml(p.summary)}</div></div>`;
    const del = document.createElement('button');
    del.className = 'preset-del';
    del.textContent = '×';
    del.onclick = async (ev)=>{
      ev.stopPropagation();
      const list2 = await loadPresets();
      list2.splice(idx,1);
      await savePresetsList(list2);
      refreshPresetList();
    };
    item.appendChild(del);
    item.onclick = ()=>{
      state.root = p.root;
      state.scaleIdx = p.scaleIdx;
      state.labelMode = p.labelMode;
      state.frets = p.frets;
      state.viewMode = p.viewMode || 'full';
      state.position = p.position || 1;
      render();
    };
    el.appendChild(item);
  });
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function initPresets(){
  presetsAvailable = true;
  document.getElementById('presetSave').addEventListener('click', async ()=>{
    const status = document.getElementById('presetStatus');
    const nameInput = document.getElementById('presetName');
    const name = nameInput.value.trim();
    if(!name){ status.textContent = 'プリセット名を入力してください。'; return; }
    if(!presetsAvailable){ status.textContent = '保存できません（window.storage 未対応の環境です）。'; return; }
    try{
      const list = await loadPresets();
      list.unshift({
        name, root: state.root, scaleIdx: state.scaleIdx,
        labelMode: state.labelMode, frets: state.frets,
        viewMode: state.viewMode, position: state.position,
        summary: currentSettingsSummary(),
      });
      await savePresetsList(list);
      nameInput.value = '';
      status.textContent = `「${name}」を保存しました。`;
      refreshPresetList();
    }catch(e){
      status.textContent = '保存に失敗しました。';
    }
  });
  refreshPresetList();
}

render();
initMetronome();
initPresets();
</script>
